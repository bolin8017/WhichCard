network:
  - mastercard
rewardType: 點數回饋
pointsName: 豐點
sourceUrl: https://bank.sinopac.com/sinopacBT/personal/credit-card/introduction/bankcard/sportcard.html
updatedAt: "2026-07-05"
# 官網:「一般消費最高享2%豐點，指定支付/通路享最高5%豐點」活動期間2026/7/1-12/31
note: 豐點1點=1元，於大咖DACARD APP設定後自動折抵帳單（每100豐點折100元），未設定則轉紅利點數（1豐點=20紅利）；所有加碼需下載註冊大咖DACARD APP並串接運動數據（每10天開啟更新）；已分期交易不回饋
rewards:
  # 官網:「國內外一般消費基本回饋電子化帳單加碼0.7%...方可符合最高1%回饋資格，否則僅享0.3%」
  # 「運動獎勵...需於消費當月達10,000大卡或Apple Watch圓滿畫圈10次，並...自動扣繳」
  # 行動支付:「一般消費綁定Apple Pay/Google Pay/Samsung Pay/Garmin Pay支付」加碼→最高5%
  # 排除依永豐一般消費定義公告:
  # https://bank.sinopac.com/sinopacBT/personal/credit-card/news/20260421090303483000000000000890.html
  - stores:
      - "*"
    storeLabel: 國內全通路
    region: domestic
    rate: 0.3
    limit: 0
    limitUnit: 點
    maxTotalRate: 5
    validFrom: "2026-07-01"
    validUntil: "2026-12-31"
    excludes:
      - 保費
      - 代繳
      - 全聯
      - 大全聯
      - 便利商店
      - 悠遊卡自動加值
      - 一卡通加值
    # TODO-REVIEW: 排除清單依永豐一般消費定義推定（活動注意事項另提保費代繳不回饋），請核對「注意事項」彈窗
    note: 一般消費最高2%（0.3%＋電子化帳單0.7%＋運動獎勵1%）；綁定指定行動支付再加碼3%達最高5%
    tiers:
      - label: 電子化帳單
        bonus: 0.7
        limit: 0
        limitUnit: 點
        condition: 當月帳單結帳日前完成電子或行動帳單設定
        tags:
          - 電子帳單
      - label: 運動獎勵
        bonus: 1
        limit: 0
        limitUnit: 點
        condition: 註冊大咖DACARD APP串接運動數據＋當月達10,000大卡或Apple Watch圓滿畫圈10次＋永豐/京城帳戶自動扣繳
        tags:
          - 自動扣繳
      - label: 行動支付加碼
        bonus: 3
        limit: 0
        limitUnit: 點
        condition: 一般消費綁定Apple Pay/Google Pay/Samsung Pay/Garmin Pay支付＋運動數據串接＋當月達卡路里門檻＋自動扣繳
        tags:
          - 行動支付
          - 自動扣繳
