    maxTotalRate: 3
    validFrom: "2026-01-01"
    validUntil: "2026-12-31"
    tiers:
      - label: 海外訂房加碼
        bonus: 2
        limit: 600
        limitUnit: 元
        condition: 需每月登錄（限量5萬名），與其他海外類別共用600元上限
        tags: [需登錄, 限期]

  # 官網:「免稅店：2%加碼（最高3%）」
  - stores: [采盟免稅店, 昇恆昌免稅店]
    region: international
    rate: 1
