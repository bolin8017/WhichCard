        tags: [需登錄, 限期]

  # 官網排除全文:「保費、自動加值儲值金、基金申購及代扣、eToro等境外投資交易、預借現金、博奕類、
  # 聯合信用卡中心小額支付平台特約商店、學雜費、公路監理資費、各項規費、各類稅款、各醫療院所費用、
  # 醫指付、電子化繳稅費平台、公務機關信用卡繳費平台、各事業單位費用(水費、電費、瓦斯費、電信費、
  # 路邊停車費)、便利商店消費(含綁定行動支付)、全聯實業旗下品牌通路(全聯、大全聯，含線上及PX Pay/
  # 全支付)、循環息、分期利息、違約金、手續費」
  - stores: ["*"]
    storeLabel: 國內全通路
    region: domestic
    rate: 1
    limit: 0
    limitUnit: 元
    excludes: [保費, 代繳, 便利商店, 全聯, 大全聯, 悠遊卡自動加值, 一卡通加值, icash加值]
    note: 另不含基金申購及代扣、小額支付平台特店、學雜費、稅款、規費、醫療費用、繳費平台（醫指付等）、境外投資平台（eToro等）、博奕、預借現金、各項手續費；便利商店含綁定行動支付（icash Pay/全盈+Pay/LINE Pay）之消費

  # 官網:「國內/海外 1%好多金回饋無上限」
  - stores: ["*"]
    storeLabel: 海外全通路
    region: international
    rate: 1
    limit: 0
    limitUnit: 元
