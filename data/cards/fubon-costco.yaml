id: fubon-costco
name: Costco聯名卡
bank: 富邦
network: [mastercard]
rewardType: 現金回饋
sourceUrl: https://www.fubon.com/banking/Personal/credit_card/all_card/Costco/costco.htm
updatedAt: "2026-07-05"
# 官網:「最高8%回饋」為世界卡＋滿額＋登錄組合；本檔以鈦金/鈦商卡為準，世界卡差異寫於各規則 note
note: 回饋為好多金，可折抵好市多消費或會費，每年3/31未使用歸零；本檔回饋以鈦金/鈦商卡為準（世界卡部分活動較高）

rewards:
  # 官網:「線上購物 3%好多金回饋無上限（2023/8/8～2027/12/31）」
  - stores: [好市多線上購物]
    region: domestic
    rate: 3
    limit: 0
    limitUnit: 元
    validFrom: "2023-08-08"
    validUntil: "2027-12-31"

  # 官網:「店內消費 2%好多金回饋無上限（2023/8/8～2027/12/31）」
  - stores: [好市多]
    region: domestic
    rate: 2
    limit: 0
    limitUnit: 元
    validFrom: "2023-08-08"
    validUntil: "2027-12-31"

  # 官網:「自助加油站最高3%（原權益2%+加碼1%，每期帳單加碼上限200元）」
  - stores: [好市多自助加油站]
    region: domestic
    rate: 2
    limit: 0
    limitUnit: 元
    maxTotalRate: 3
    validFrom: "2023-08-08"
    validUntil: "2027-12-31"
    tiers:
      - label: 加油站加碼
        bonus: 1
        limit: 200
        limitUnit: 元
        condition: 好市多自助加油站消費自動加碼，每期帳單上限200元
        tags: [指定通路]

  # 官網:「UberEats好市多專區加碼1%（2026/7/1～12/31，每月無上限）」
  - stores: [UberEats好市多專區]
    region: domestic
    rate: 1
    limit: 0
    limitUnit: 元
    maxTotalRate: 2
    validFrom: "2026-07-01"
    validUntil: "2026-12-31"
    tiers:
      - label: UberEats加碼
        bonus: 1
        limit: 0
        limitUnit: 元
        condition: UberEats好市多專區消費加碼，每月無上限；使用第三方支付之交易不適用
        tags: [指定通路, 限期]

  # 官網:「前月店外一般消費滿額，當月持該卡至高鐵/臺鐵購票並登錄」(2026/1/1～12/31)
  # 官網:「鈦商/鈦金卡：滿6千享2%、滿1.2萬享3%（加碼上限450元）；富邦帳戶自動扣繳額外加碼至4%」
  # 官網:「世界卡：滿6千3%、滿1.2萬6%，自動扣繳加碼後最高8%（上限550元）」
  - stores: [台灣高鐵, 台鐵]
    region: domestic
    rate: 1
    limit: 0
    limitUnit: 元
    maxTotalRate: 4
    validFrom: "2026-01-01"
    validUntil: "2026-12-31"
    note: 需登錄；本檔為鈦金/鈦商卡（最高4%），世界卡為滿6千3%/滿1.2萬6%/自扣後最高8%（上限550元/月）
    tiers:
      - label: 前月消費滿6,000
        bonus: 1
        limit: 450
        limitUnit: 元
        condition: 需登錄，前月店外消費滿6,000元，當月高鐵/臺鐵購票享2%（鈦金/鈦商卡）
        tags: [需登錄, 最低消費]
      - label: 前月消費滿12,000
        bonus: 2
        limit: 450
        limitUnit: 元
        condition: 需登錄，前月店外消費滿12,000元，當月高鐵/臺鐵購票享3%（鈦金/鈦商卡）
        tags: [需登錄, 最低消費]
      - label: 自動扣繳加碼
        bonus: 1
        limit: 450
        limitUnit: 元
        condition: 使用富邦帳戶自動扣繳卡費，與滿額加碼併計最高4%（鈦金/鈦商卡），共用450元上限
        tags: [自動扣繳]

  # 精選海外旅遊 — 官網:「實體商店加碼4%（最高5%）；每月1日00:00開放登錄，限量5萬名；
  # 每月每戶加碼上限600元好多金；活動期間2026/1/1~2026/12/31」
  - stores: ["*"]
    storeLabel: 國外實體商店
    region: international
    rate: 1
    limit: 0
    limitUnit: 元
    maxTotalRate: 5
    validFrom: "2026-01-01"
    validUntil: "2026-12-31"
    note: 限國外實體商店；與其他海外精選類別共用每月600元加碼上限
    tiers:
      - label: 海外實體加碼
        bonus: 4
        limit: 600
        limitUnit: 元
        condition: 需每月登錄（每月1日開放，限量5萬名），與其他海外類別共用600元上限
        tags: [需登錄, 限期]

  # 官網:「航空公司（中華、長榮等）：2%加碼（最高3%）」
  - stores: [航空公司]
    region: international
    rate: 1
    limit: 0
