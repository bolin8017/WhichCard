        tags: [需登錄, 限期]

  # 官網:「旅行社/訂房平台：2%加碼（最高3%）」
  - stores: [旅行社]
    region: international
    rate: 1
    limit: 0
    limitUnit: 元
    maxTotalRate: 3
    validFrom: "2026-01-01"
    validUntil: "2026-12-31"
    tiers:
      - label: 海外旅行社加碼
        bonus: 2
        limit: 600
        limitUnit: 元
        condition: 需每月登錄（限量5萬名），與其他海外類別共用600元上限
        tags: [需登錄, 限期]

  - stores: [Booking.com, Agoda, Trip.com, Hotels, Expedia]
    region: international
    rate: 1
