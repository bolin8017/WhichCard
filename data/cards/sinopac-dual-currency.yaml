# 官網:「新申辦享最高8%現金回饋」= 2%基本+4%精選+2%新申辦行動支付；新申辦2%屬新戶向活動，依政策不收錄
note: 申卡須綁定永豐外幣帳戶自動扣繳，國外回饋金存入外幣帳戶；新戶行動支付加碼活動未收錄
rewards:
  # 官網:「國內一般消費1%現金回饋無上限（2026/7/1~12/31）」
  - stores:
      - "*"
    storeLabel: 國內全通路
    region: domestic
    rate: 1
    limit: 0
    limitUnit: 元
    excludes:
      - 保費
      - 代繳
    validFrom: "2026-07-01"
    validUntil: "2026-12-31"
    note: 不含分期交易、特定行銷專案保費
  # 官網:「海外基本2%現金回饋無上限」「精選通路加碼4%：自動扣繳+電子帳單，且前月往來資產月均≥10萬或大戶等級，上限800元/帳單週期」
  # TODO-REVIEW: 前期曾有「一般用戶」300元上限檔位，本期頁面未見，需確認是否取消
  - stores:
      - "*"
    storeLabel: 海外全通路
    region: international
    rate: 2
    limit: 0
    limitUnit: 元
    maxTotalRate: 6
    validFrom: "2026-07-01"
    validUntil: "2026-12-31"
    note: 不含分期、預借現金、賭場交易、各項手續費；加碼限國外實體消費（不含百貨商場內商店、第三方支付）
    tiers:
      - label: 海外實體加碼
        bonus: 4
        limit: 800
        limitUnit: 元
        condition: 設定永豐帳戶自動扣繳＋電子/行動帳單，且前月往來資產月均≥10萬或大戶/大戶Plus等級
        tags:
          - 自動扣繳
          - 電子帳單
          - 會員等級
  # 官網:「保費1.2%現金回饋無上限（MCC 6300，壽險+產險）（2026/7/1~12/31）」
  - stores:
      - 保費
    region: domestic
    rate: 1.2
    limit: 0
    limitUnit: 元
    validFrom: "2026-07-01"
    validUntil: "2026-12-31"
    note: MCC 6300（壽險+產險），不含特定行銷專案保費、分期保費
