# 官網:「小樹點(信用卡)點數價值為1點等值NT$1元」「每月指定消費累計以消費日當日信用額度加計50萬元為限」
note: 小樹點1點=1元，消費入帳後次二日回饋；指定消費回饋每月以信用額度+50萬元內之消費計算；權益方案每日可於CUBE App切換一次
rewards:
  # 官網:「一般消費享0.3%」
  - stores:
      - "*"
    storeLabel: 國內全通路
    region: domestic
    rate: 0.3
    limit: 0
    limitUnit: 點
    excludes:
      - 代繳
      - 悠遊卡自動加值
    note: 不含信用卡費、預借現金、分期、菸酒、代收代售、禮券、eTag儲值等

  # 官網:「一般消費享0.3%」（海外一般消費，另有海外交易手續費）
